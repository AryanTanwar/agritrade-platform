name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 03:00 UTC

jobs:
  # ── 1. Secret detection ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for git log scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency vulnerabilities ────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true    # Report but don't block — tighten over time
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Go vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.22'
          go-package:       './chaincode/...'

  # ── 3. Container scanning ─────────────────────────────────────────────────────
  trivy-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image for scanning
        run: docker build -t agritrade/gateway:scan --target production ./gateway

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:       'agritrade/gateway:scan'
          format:          'sarif'
          output:          'trivy-results.sarif'
          severity:        'CRITICAL,HIGH'
          exit-code:       '1'         # Fail on CRITICAL/HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 4. SAST — Static Application Security Testing ────────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Auto-build
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── 5. Licence compliance ─────────────────────────────────────────────────────
  licence-check:
    name: Licence Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licences (block GPL in production deps)
        run: |
          npx license-checker \
            --production \
            --excludePrivatePackages \
            --failOn "GPL;AGPL;LGPL" \
            --summary
