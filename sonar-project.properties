sonar.projectKey=agritrade-platform
sonar.projectName=AgriTrade Platform
sonar.projectVersion=1.0.0
sonar.organization=agritrade

# Source paths
sonar.sources=gateway/src,services,shared
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/coverage/**

# JavaScript / Node.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Go (chaincode)
sonar.go.coverage.reportPaths=chaincode/coverage.out

# Quality gate thresholds
sonar.qualitygate.wait=true

# Security — fail on blockers and critical bugs
sonar.issue.severity.default=MINOR
