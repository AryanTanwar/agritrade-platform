# =============================================================================
# Hyperledger Fabric v2.5 — AgriTrade Network
# =============================================================================
# Services:
#   orderer.agritrade.com             — Raft orderer
#   peer0/1.farmers.agritrade.com     — FarmersOrg peers
#   peer0/1.buyers.agritrade.com      — BuyersOrg peers
#   peer0/1.logistics.agritrade.com   — LogisticsOrg peers
#   couchdb0-5                        — CouchDB state databases (rich queries)
#   ca.farmers/buyers/logistics       — Fabric CA per org
#   cli                               — Admin CLI container
# =============================================================================

version: '3.8'

networks:
    agritrade-fabric:
        name: agritrade-fabric
        driver: bridge
        ipam:
            config:
                - subnet: 172.25.0.0/16

volumes:
    orderer.agritrade.com:
    peer0.farmers.agritrade.com:
    peer1.farmers.agritrade.com:
    peer0.buyers.agritrade.com:
    peer1.buyers.agritrade.com:
    peer0.logistics.agritrade.com:
    peer1.logistics.agritrade.com:
    couchdb0:
    couchdb1:
    couchdb2:
    couchdb3:
    couchdb4:
    couchdb5:

services:
    # ==========================================================================
    # Certificate Authorities
    # ==========================================================================

    ca.farmers.agritrade.com:
        image: hyperledger/fabric-ca:1.5
        container_name: ca.farmers.agritrade.com
        hostname: ca.farmers.agritrade.com
        environment:
            - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
            - FABRIC_CA_SERVER_CA_NAME=ca-farmers
            - FABRIC_CA_SERVER_TLS_ENABLED=true
            - FABRIC_CA_SERVER_PORT=7054
            - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
        ports:
            - "7054:7054"
            - "17054:17054"
        command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
        volumes:
            - ./ca/farmers/fabric-ca-server-config.yaml:/etc/hyperledger/fabric-ca-server/fabric-ca-server-config.yaml
            - ./crypto-config/peerOrganizations/farmers.agritrade.com/ca/:/etc/hyperledger/fabric-ca-server/
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:17054/healthz"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 10s

    ca.buyers.agritrade.com:
        image: hyperledger/fabric-ca:1.5
        container_name: ca.buyers.agritrade.com
        hostname: ca.buyers.agritrade.com
        environment:
            - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
            - FABRIC_CA_SERVER_CA_NAME=ca-buyers
            - FABRIC_CA_SERVER_TLS_ENABLED=true
            - FABRIC_CA_SERVER_PORT=8054
            - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
        ports:
            - "8054:8054"
            - "18054:17054"
        command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
        volumes:
            - ./ca/buyers/fabric-ca-server-config.yaml:/etc/hyperledger/fabric-ca-server/fabric-ca-server-config.yaml
            - ./crypto-config/peerOrganizations/buyers.agritrade.com/ca/:/etc/hyperledger/fabric-ca-server/
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:17054/healthz"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 10s

    ca.logistics.agritrade.com:
        image: hyperledger/fabric-ca:1.5
        container_name: ca.logistics.agritrade.com
        hostname: ca.logistics.agritrade.com
        environment:
            - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
            - FABRIC_CA_SERVER_CA_NAME=ca-logistics
            - FABRIC_CA_SERVER_TLS_ENABLED=true
            - FABRIC_CA_SERVER_PORT=9054
            - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
        ports:
            - "9054:9054"
            - "19054:17054"
        command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
        volumes:
            - ./ca/logistics/fabric-ca-server-config.yaml:/etc/hyperledger/fabric-ca-server/fabric-ca-server-config.yaml
            - ./crypto-config/peerOrganizations/logistics.agritrade.com/ca/:/etc/hyperledger/fabric-ca-server/
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:17054/healthz"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 10s

    # ==========================================================================
    # Orderer
    # ==========================================================================

    orderer.agritrade.com:
        image: hyperledger/fabric-orderer:2.5
        container_name: orderer.agritrade.com
        hostname: orderer.agritrade.com
        environment:
            - FABRIC_LOGGING_SPEC=INFO
            - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
            - ORDERER_GENERAL_LISTENPORT=7050
            - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
            - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
            # TLS
            - ORDERER_GENERAL_TLS_ENABLED=true
            - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
            - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
            - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
            # Cluster TLS (Raft)
            - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
            - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
            - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
            # Genesis block
            - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
            - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
            # Admin channel
            - ORDERER_CHANNELPARTICIPATION_ENABLED=true
            - ORDERER_ADMIN_TLS_ENABLED=true
            - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
            - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
            - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
            - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
            - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
            # Operations
            - ORDERER_OPERATIONS_LISTENADDRESS=orderer.agritrade.com:8443
            - ORDERER_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric
        command: orderer
        volumes:
            - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
            - ./crypto-config/ordererOrganizations/agritrade.com/orderers/orderer.agritrade.com/msp:/var/hyperledger/orderer/msp
            - ./crypto-config/ordererOrganizations/agritrade.com/orderers/orderer.agritrade.com/tls:/var/hyperledger/orderer/tls
            - orderer.agritrade.com:/var/hyperledger/production/orderer
        ports:
            - "7050:7050"
            - "7053:7053"
            - "8443:8443"
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD", "grpc_health_probe", "-addr=:7050"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s

    # ==========================================================================
    # CouchDB instances — one per peer
    # ==========================================================================

    couchdb0:
        image: couchdb:3.3
        container_name: couchdb0
        hostname: couchdb0
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "5984:5984"
        volumes:
            - couchdb0:/opt/couchdb/data
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
            interval: 15s
            timeout: 5s
            retries: 5

    couchdb1:
        image: couchdb:3.3
        container_name: couchdb1
        hostname: couchdb1
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "6984:5984"
        volumes:
            - couchdb1:/opt/couchdb/data
        networks:
            - agritrade-fabric

    couchdb2:
        image: couchdb:3.3
        container_name: couchdb2
        hostname: couchdb2
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "7984:5984"
        volumes:
            - couchdb2:/opt/couchdb/data
        networks:
            - agritrade-fabric

    couchdb3:
        image: couchdb:3.3
        container_name: couchdb3
        hostname: couchdb3
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "8984:5984"
        volumes:
            - couchdb3:/opt/couchdb/data
        networks:
            - agritrade-fabric

    couchdb4:
        image: couchdb:3.3
        container_name: couchdb4
        hostname: couchdb4
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "9984:5984"
        volumes:
            - couchdb4:/opt/couchdb/data
        networks:
            - agritrade-fabric

    couchdb5:
        image: couchdb:3.3
        container_name: couchdb5
        hostname: couchdb5
        environment:
            - COUCHDB_USER=admin
            - COUCHDB_PASSWORD=adminpw
        ports:
            - "10984:5984"
        volumes:
            - couchdb5:/opt/couchdb/data
        networks:
            - agritrade-fabric

    # ==========================================================================
    # FarmersOrg Peers
    # ==========================================================================

    peer0.farmers.agritrade.com:
        image: hyperledger/fabric-peer:2.5
        container_name: peer0.farmers.agritrade.com
        hostname: peer0.farmers.agritrade.com
        environment:
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=agritrade-fabric
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer0.farmers.agritrade.com
            - CORE_PEER_ADDRESS=peer0.farmers.agritrade.com:7051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
            - CORE_PEER_CHAINCODEADDRESS=peer0.farmers.agritrade.com:7052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.farmers.agritrade.com:8051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.farmers.agritrade.com:7051
            - CORE_PEER_LOCALMSPID=FarmersMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            # CouchDB state database
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            # Operations
            - CORE_OPERATIONS_LISTENADDRESS=peer0.farmers.agritrade.com:9444
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/farmers.agritrade.com/peers/peer0.farmers.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/farmers.agritrade.com/peers/peer0.farmers.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer0.farmers.agritrade.com:/var/hyperledger/production
        ports:
            - "7051:7051"
            - "9444:9444"
        depends_on:
            couchdb0:
                condition: service_healthy
            orderer.agritrade.com:
                condition: service_started
        networks:
            - agritrade-fabric
        healthcheck:
            test: ["CMD-SHELL", "peer node status 2>&1 | grep -q 'status:STARTED'"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s

    peer1.farmers.agritrade.com:
        image: hyperledger/fabric-peer:2.5
        container_name: peer1.farmers.agritrade.com
        hostname: peer1.farmers.agritrade.com
        environment:
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=agritrade-fabric
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer1.farmers.agritrade.com
            - CORE_PEER_ADDRESS=peer1.farmers.agritrade.com:8051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
            - CORE_PEER_CHAINCODEADDRESS=peer1.farmers.agritrade.com:8052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.farmers.agritrade.com:7051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.farmers.agritrade.com:8051
            - CORE_PEER_LOCALMSPID=FarmersMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            - CORE_OPERATIONS_LISTENADDRESS=peer1.farmers.agritrade.com:9445
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/farmers.agritrade.com/peers/peer1.farmers.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/farmers.agritrade.com/peers/peer1.farmers.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer1.farmers.agritrade.com:/var/hyperledger/production
        ports:
            - "8051:8051"
            - "9445:9445"
        depends_on:
            - couchdb1
            - orderer.agritrade.com
        networks:
            - agritrade-fabric

