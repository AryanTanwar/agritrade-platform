            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer0.buyers.agritrade.com
            - CORE_PEER_ADDRESS=peer0.buyers.agritrade.com:9051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
            - CORE_PEER_CHAINCODEADDRESS=peer0.buyers.agritrade.com:9052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.buyers.agritrade.com:10051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.buyers.agritrade.com:9051
            - CORE_PEER_LOCALMSPID=BuyersMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            - CORE_OPERATIONS_LISTENADDRESS=peer0.buyers.agritrade.com:9446
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/buyers.agritrade.com/peers/peer0.buyers.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/buyers.agritrade.com/peers/peer0.buyers.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer0.buyers.agritrade.com:/var/hyperledger/production
        ports:
            - "9051:9051"
            - "9446:9446"
        depends_on:
            - couchdb2
            - orderer.agritrade.com
        networks:
            - agritrade-fabric

    peer1.buyers.agritrade.com:
        image: hyperledger/fabric-peer:2.5
        container_name: peer1.buyers.agritrade.com
        hostname: peer1.buyers.agritrade.com
        environment:
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=agritrade-fabric
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer1.buyers.agritrade.com
            - CORE_PEER_ADDRESS=peer1.buyers.agritrade.com:10051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
            - CORE_PEER_CHAINCODEADDRESS=peer1.buyers.agritrade.com:10052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.buyers.agritrade.com:9051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.buyers.agritrade.com:10051
            - CORE_PEER_LOCALMSPID=BuyersMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            - CORE_OPERATIONS_LISTENADDRESS=peer1.buyers.agritrade.com:9447
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/buyers.agritrade.com/peers/peer1.buyers.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/buyers.agritrade.com/peers/peer1.buyers.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer1.buyers.agritrade.com:/var/hyperledger/production
        ports:
            - "10051:10051"
            - "9447:9447"
        depends_on:
            - couchdb3
            - orderer.agritrade.com
        networks:
            - agritrade-fabric

    # ==========================================================================
    # LogisticsOrg Peers
    # ==========================================================================

    peer0.logistics.agritrade.com:
        image: hyperledger/fabric-peer:2.5
        container_name: peer0.logistics.agritrade.com
        hostname: peer0.logistics.agritrade.com
        environment:
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=agritrade-fabric
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer0.logistics.agritrade.com
            - CORE_PEER_ADDRESS=peer0.logistics.agritrade.com:11051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
            - CORE_PEER_CHAINCODEADDRESS=peer0.logistics.agritrade.com:11052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.logistics.agritrade.com:12051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.logistics.agritrade.com:11051
            - CORE_PEER_LOCALMSPID=LogisticsMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb4:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            - CORE_OPERATIONS_LISTENADDRESS=peer0.logistics.agritrade.com:9448
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/logistics.agritrade.com/peers/peer0.logistics.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/logistics.agritrade.com/peers/peer0.logistics.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer0.logistics.agritrade.com:/var/hyperledger/production
        ports:
            - "11051:11051"
            - "9448:9448"
        depends_on:
            - couchdb4
            - orderer.agritrade.com
        networks:
            - agritrade-fabric

    peer1.logistics.agritrade.com:
        image: hyperledger/fabric-peer:2.5
        container_name: peer1.logistics.agritrade.com
        hostname: peer1.logistics.agritrade.com
        environment:
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=agritrade-fabric
            - FABRIC_LOGGING_SPEC=INFO
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_PROFILE_ENABLED=false
            - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
            - CORE_PEER_ID=peer1.logistics.agritrade.com
            - CORE_PEER_ADDRESS=peer1.logistics.agritrade.com:12051
            - CORE_PEER_LISTENADDRESS=0.0.0.0:12051
            - CORE_PEER_CHAINCODEADDRESS=peer1.logistics.agritrade.com:12052
            - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:12052
            - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.logistics.agritrade.com:11051
            - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.logistics.agritrade.com:12051
            - CORE_PEER_LOCALMSPID=LogisticsMSP
            - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
            - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
            - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb5:5984
            - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
            - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
            - CORE_OPERATIONS_LISTENADDRESS=peer1.logistics.agritrade.com:9449
            - CORE_METRICS_PROVIDER=prometheus
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: peer node start
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config/peerOrganizations/logistics.agritrade.com/peers/peer1.logistics.agritrade.com/msp:/etc/hyperledger/fabric/msp
            - ./crypto-config/peerOrganizations/logistics.agritrade.com/peers/peer1.logistics.agritrade.com/tls:/etc/hyperledger/fabric/tls
            - peer1.logistics.agritrade.com:/var/hyperledger/production
        ports:
            - "12051:12051"
            - "9449:9449"
        depends_on:
            - couchdb5
            - orderer.agritrade.com
        networks:
            - agritrade-fabric

    # ==========================================================================
    # Admin CLI — used by scripts to invoke peer/orderer commands
    # ==========================================================================

    cli:
        image: hyperledger/fabric-tools:2.5
        container_name: cli
        hostname: cli
        tty: true
        stdin_open: true
        environment:
            - GOPATH=/opt/gopath
            - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
            - FABRIC_LOGGING_SPEC=INFO
            # Default to FarmersOrg admin for initial channel setup
            - CORE_PEER_ID=cli
            - CORE_PEER_ADDRESS=peer0.farmers.agritrade.com:7051
            - CORE_PEER_LOCALMSPID=FarmersMSP
            - CORE_PEER_TLS_ENABLED=true
            - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/farmers.agritrade.com/peers/peer0.farmers.agritrade.com/tls/server.crt
            - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/farmers.agritrade.com/peers/peer0.farmers.agritrade.com/tls/server.key
            - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/farmers.agritrade.com/peers/peer0.farmers.agritrade.com/tls/ca.crt
            - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/farmers.agritrade.com/users/Admin@farmers.agritrade.com/msp
        working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
        command: /bin/bash
        volumes:
            - /var/run/docker.sock:/host/var/run/docker.sock
            - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
            - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
            - ../chaincode:/opt/gopath/src/github.com/agritrade/chaincode
            - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
        depends_on:
            - peer0.farmers.agritrade.com
            - peer0.buyers.agritrade.com
            - peer0.logistics.agritrade.com
        networks:
            - agritrade-fabric
