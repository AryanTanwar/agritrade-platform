# =============================================================================
# Hyperledger Fabric CA Server Configuration — FarmersOrg
# =============================================================================
# CA for farmers.agritrade.com
# Port 7054 (internal), TLS enabled
# =============================================================================

version: 1.5.7

# Server listening port
port: 7054

# Enable TLS
tls:
    enabled: true
    certfile: /etc/hyperledger/fabric-ca-server/tls-cert.pem
    keyfile:  /etc/hyperledger/fabric-ca-server/tls-key.pem
    clientauth:
        type: noclientcert

# CA name uniquely identifies this CA on the network
ca:
    name: ca-farmers
    keyfile:  /etc/hyperledger/fabric-ca-server/ca-key.pem
    certfile: /etc/hyperledger/fabric-ca-server/ca-cert.pem
    chainfile: /etc/hyperledger/fabric-ca-server/ca-chain.pem

# CRL (Certificate Revocation List)
crl:
    expiry: 24h

# ── Registry: bootstrap admin identity ────────────────────────────────────────
registry:
    maxenrollments: -1  # unlimited re-enrolments (set to 1 in production)
    identities:
        - name: admin
          pass: adminpw
          type: client
          affiliation: ""
          attrs:
              hf.Registrar.Roles: "client,user,peer,validator,auditor"
              hf.Registrar.DelegateRoles: "client,user,validator,auditor"
              hf.Revoker: true
              hf.IntermediateCA: false
              hf.GenCRL: true
              hf.Registrar.Attributes: "*"
              hf.AffiliationMgr: true

# ── Database (SQLite for dev; swap to PostgreSQL for production) ──────────────
db:
    type: sqlite3
    datasource: fabric-ca-server.db
    tls:
        enabled: false

# ── LDAP — disabled; use internal registry ────────────────────────────────────
ldap:
    enabled: false

# ── Affiliations — maps to org units within FarmersOrg ───────────────────────
affiliations:
    farmers:
        - cooperative
        - individual
        - inspector

# ── Signing profile ───────────────────────────────────────────────────────────
signing:
    default:
        usage:
            - digital signature
        expiry: 8760h  # 1 year
    profiles:
        ca:
            usage:
                - cert sign
                - crl sign
            expiry: 43800h  # 5 years
            caconstraint:
                isca: true
                maxpathlen: 0
        tls:
            usage:
                - signing
                - key encipherment
                - server auth
                - client auth
                - key agreement
            expiry: 8760h

# ── CSR — Certificate Signing Request defaults ────────────────────────────────
csr:
    cn: ca.farmers.agritrade.com
    keyrequest:
        algo: ecdsa
        size: 256
    names:
        - C:  IN
          ST: Maharashtra
          L:  Pune
          O:  AgriTrade FarmersOrg
          OU: Fabric
    hosts:
        - ca.farmers.agritrade.com
        - localhost
        - 127.0.0.1
    ca:
        expiry: 131400h  # 15 years
        pathlength: 1

# ── BCCSP (crypto provider) ───────────────────────────────────────────────────
bccsp:
    default: SW
    sw:
        hash: SHA2
        security: 256
        filekeystore:
            keystore: msp/keystore

# ── Operations (metrics endpoint) ────────────────────────────────────────────
operations:
    listenAddress: 0.0.0.0:9443
    tls:
        enabled: false

# ── idemix (anonymous credentials) — disabled for AgriTrade ──────────────────
idemix:
    rhpoolsize: 1000
    nonceexpiration: 15s
    noncesweepinterval: 15m
