# =============================================================================
# Hyperledger Fabric CA Server Configuration — BuyersOrg
# =============================================================================
# CA for buyers.agritrade.com
# Port 8054 (internal), TLS enabled
# =============================================================================

version: 1.5.7

port: 8054

tls:
    enabled: true
    certfile: /etc/hyperledger/fabric-ca-server/tls-cert.pem
    keyfile:  /etc/hyperledger/fabric-ca-server/tls-key.pem
    clientauth:
        type: noclientcert

ca:
    name: ca-buyers
    keyfile:  /etc/hyperledger/fabric-ca-server/ca-key.pem
    certfile: /etc/hyperledger/fabric-ca-server/ca-cert.pem
    chainfile: /etc/hyperledger/fabric-ca-server/ca-chain.pem

crl:
    expiry: 24h

registry:
    maxenrollments: -1
    identities:
        - name: admin
          pass: adminpw
          type: client
          affiliation: ""
          attrs:
              hf.Registrar.Roles: "client,user,peer,validator,auditor"
              hf.Registrar.DelegateRoles: "client,user,validator,auditor"
              hf.Revoker: true
              hf.IntermediateCA: false
              hf.GenCRL: true
              hf.Registrar.Attributes: "*"
              hf.AffiliationMgr: true

db:
    type: sqlite3
    datasource: fabric-ca-server.db
    tls:
        enabled: false

ldap:
    enabled: false

affiliations:
    buyers:
        - wholesale
        - retail
        - institutional
        - exporter

signing:
    default:
        usage:
            - digital signature
        expiry: 8760h
    profiles:
        ca:
            usage:
                - cert sign
                - crl sign
            expiry: 43800h
            caconstraint:
                isca: true
                maxpathlen: 0
        tls:
            usage:
                - signing
                - key encipherment
                - server auth
                - client auth
                - key agreement
            expiry: 8760h

csr:
    cn: ca.buyers.agritrade.com
    keyrequest:
        algo: ecdsa
        size: 256
    names:
        - C:  IN
          ST: Maharashtra
          L:  Mumbai
          O:  AgriTrade BuyersOrg
          OU: Fabric
    hosts:
        - ca.buyers.agritrade.com
        - localhost
        - 127.0.0.1
    ca:
        expiry: 131400h
        pathlength: 1

bccsp:
    default: SW
    sw:
        hash: SHA2
        security: 256
        filekeystore:
            keystore: msp/keystore

operations:
    listenAddress: 0.0.0.0:9443
    tls:
        enabled: false

idemix:
    rhpoolsize: 1000
    nonceexpiration: 15s
    noncesweepinterval: 15m
