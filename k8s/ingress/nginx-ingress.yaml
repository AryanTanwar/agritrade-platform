apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agritrade-ingress
  namespace: agritrade
  annotations:
    kubernetes.io/ingress.class: nginx

    # ── TLS & HTTPS enforcement ──────────────────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect:        "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect:  "true"
    cert-manager.io/cluster-issuer:                  "letsencrypt-prod"

    # ── TLS hardening ────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-protocols:    "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers:      "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256"

    # ── Rate limiting at ingress level (first line of defence) ───────────────
    nginx.ingress.kubernetes.io/limit-rps:        "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # ── Request size limits ──────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size:  "10m"

    # ── Security headers ─────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=(self), payment=(self)";
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";

    # ── CORS (handled at gateway — disable at ingress to avoid double headers) ─
    nginx.ingress.kubernetes.io/enable-cors: "false"

    # ── Proxy settings ───────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "60"

spec:
  tls:
    - hosts:
        - agritrade.example.com
        - api.agritrade.example.com
        - admin.agritrade.example.com
      secretName: agritrade-tls-secret

  rules:
    - host: api.agritrade.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agritrade-gateway
                port:
                  number: 8080

    - host: agritrade.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agritrade-frontend
                port:
                  number: 3000
