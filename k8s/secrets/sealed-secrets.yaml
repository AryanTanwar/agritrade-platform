# ─────────────────────────────────────────────────────────────────────────────
# AgriTrade — SealedSecret template
# Values MUST be encrypted with kubeseal before committing.
#
# Usage:
#   1. Install kubeseal CLI: brew install kubeseal
#   2. Create a plain Secret YAML (NEVER commit this):
#      kubectl create secret generic agritrade-secrets \
#        --from-literal=JWT_SECRET=$(openssl rand -hex 64) \
#        --from-literal=AES_ENCRYPTION_KEY=$(openssl rand -hex 32) \
#        --dry-run=client -o yaml > /tmp/plain-secret.yaml
#   3. Seal it:
#      kubeseal --format yaml < /tmp/plain-secret.yaml > k8s/secrets/sealed-secrets.yaml
#   4. Delete the plain file: rm /tmp/plain-secret.yaml
#   5. Commit sealed-secrets.yaml — it is safe to store in git.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: agritrade-secrets
  namespace: agritrade
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # Replace all values below with output from kubeseal
    JWT_SECRET:           REPLACE_WITH_KUBESEAL_OUTPUT
    JWT_REFRESH_SECRET:   REPLACE_WITH_KUBESEAL_OUTPUT
    AES_ENCRYPTION_KEY:   REPLACE_WITH_KUBESEAL_OUTPUT
    DB_PASSWORD:          REPLACE_WITH_KUBESEAL_OUTPUT
    REDIS_PASSWORD:       REPLACE_WITH_KUBESEAL_OUTPUT
    RAZORPAY_KEY_SECRET:  REPLACE_WITH_KUBESEAL_OUTPUT
    TWILIO_AUTH_TOKEN:    REPLACE_WITH_KUBESEAL_OUTPUT
    SMTP_PASSWORD:        REPLACE_WITH_KUBESEAL_OUTPUT
    VAULT_TOKEN:          REPLACE_WITH_KUBESEAL_OUTPUT
    LOGISTICS_API_KEY:    REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: agritrade-secrets
      namespace: agritrade
    type: Opaque
