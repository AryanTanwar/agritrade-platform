apiVersion: v1
kind: ConfigMap
metadata:
  name: agritrade-config
  namespace: agritrade
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  APP_NAME: "AgriTrade"
  APP_PORT: "3000"

  GATEWAY_PORT: "8080"
  GATEWAY_RATE_LIMIT_WINDOW_MS: "60000"
  GATEWAY_RATE_LIMIT_MAX: "100"

  DB_HOST: "agritrade-postgres"
  DB_PORT: "5432"
  DB_NAME: "agritrade"
  DB_USER: "agritrade_app"
  DB_SSL: "false"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"

  REDIS_HOST: "agritrade-redis"
  REDIS_PORT: "6379"
  REDIS_TLS: "false"

  AES_IV_LENGTH: "16"

  SVC_USER_URL:         "http://svc-user:3001"
  SVC_LISTING_URL:      "http://svc-listing:3002"
  SVC_ORDER_URL:        "http://svc-order:3003"
  SVC_PAYMENT_URL:      "http://svc-payment:3004"
  SVC_LOGISTICS_URL:    "http://svc-logistics:3005"
  SVC_NOTIFICATION_URL: "http://svc-notification:3006"

  FABRIC_CHANNEL_NAME: "agritrade-channel"
  FABRIC_CHAINCODE_NAME: "agritrade"
  FABRIC_PEER_ENDPOINT: "fabric-peer:7051"
  FABRIC_CA_URL: "https://fabric-ca:7054"
  FABRIC_WALLET_PATH: "/app/wallet"
  FABRIC_ORG_MSP: "FarmersMSP"
  FABRIC_ADMIN_ID: "admin"

  IPFS_API_URL: "http://agritrade-ipfs:5001"

  CORS_ALLOWED_ORIGINS: "https://agritrade.example.com,https://admin.agritrade.example.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,PATCH,DELETE"

  VAULT_ADDR: "https://vault.agritrade.internal:8200"
  VAULT_MOUNT_PATH: "secret/agritrade"
