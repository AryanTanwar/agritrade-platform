---
apiVersion: v1
kind: Service
metadata:
  name: svc-order
  namespace: agritrade
  labels:
    app: agritrade-svc-order
    tier: service
spec:
  type: ClusterIP
  selector:
    app: agritrade-svc-order
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agritrade-svc-order
  namespace: agritrade
  labels:
    app: agritrade-svc-order
    tier: service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agritrade-svc-order
  template:
    metadata:
      labels:
        app: agritrade-svc-order
        tier: service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: order
          image: agritrade/svc-order:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: SERVICE_NAME
              value: "order"
          envFrom:
            - configMapRef:
                name: agritrade-config
            - secretRef:
                name: agritrade-secrets
          resources:
            requests:
              cpu: "75m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
