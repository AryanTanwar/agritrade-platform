---
apiVersion: v1
kind: Service
metadata:
  name: agritrade-frontend
  namespace: agritrade
  labels:
    app: agritrade-frontend
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: agritrade-frontend
  ports:
    - name: http
      port: 3000        # ingress backend port (k8s/ingress/nginx-ingress.yaml)
      targetPort: 80    # nginx in client/web/Dockerfile listens on 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agritrade-frontend
  namespace: agritrade
  labels:
    app: agritrade-frontend
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agritrade-frontend
  template:
    metadata:
      labels:
        app: agritrade-frontend
        tier: frontend
    spec:
      # nginx:alpine writes pid/cache as root by default. Hardening kept where
      # possible; switch to nginxinc/nginx-unprivileged to add runAsNonRoot.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: agritrade/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID", "DAC_OVERRIDE"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
