apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: agritrade
  labels:
    app.kubernetes.io/part-of: agritrade
spec:
  podSelector: {}        # Applies to ALL pods in the namespace
  policyTypes:
    - Ingress
    - Egress
  # No ingress or egress rules = deny everything by default
  # Specific allow rules are in allow-services.yaml
